name: seeking_browser
description: "A modern web browser built specifically for Android TV"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # WebView for browsing
  webview_flutter: ^4.8.0
  webview_flutter_android: ^3.16.0
  
  # State Management
  provider: ^6.1.2
  
  # Storage for settings, bookmarks, history
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.2
  
  # Utilities
  uuid: ^4.5.1
  url_launcher: ^6.3.0
  
  # Functional programming - Either type for error handling
  dartz: ^0.10.1
  
  # HTTP for potential future features
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/icon.png"
